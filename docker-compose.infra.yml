services:
  mousiqi-postgres:
    image: postgres:16-alpine
    container_name: mousiqi_postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mousiqi}
      POSTGRES_USER: ${POSTGRES_USER:-mousiqi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - mousiqi_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mousiqi}"]
      interval: 5s
      timeout: 3s
      retries: 5

  mousiqi-redis:
    image: redis:7-alpine
    container_name: mousiqi_redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  mousiqi_pgdata:
